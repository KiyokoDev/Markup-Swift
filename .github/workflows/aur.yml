name: Publish to AUR

on:
  push:
    tags: 'v*'

jobs:
  aur:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Push PKGBUILD to AUR
        run: |
          git clone ssh://aur@aur.archlinux.org/markup-swift.git /tmp/aur-pkg
          cp contrib/PKGBUILD contrib/.SRCINFO /tmp/aur-pkg/
          cd /tmp/aur-pkg
          git config user.name "${{ secrets.AUR_USERNAME }}"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "Update PKGBUILD to ${{ github.ref_name }}"
            git push origin master
          fi
